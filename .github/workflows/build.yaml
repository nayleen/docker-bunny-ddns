name: Build Image

on:
  workflow_call:
    inputs:
      version:
        description: Image version to publish
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions: {}

jobs:
  build:
    runs-on: ${{ matrix.arch == 'amd64' && 'ubuntu-latest' || 'ubuntu-24.04-arm' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Login to Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: nayleen
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build and Push Docker Images
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          cache-from: type=registry,ref=ghcr.io/nayleen/bunny-ddns:${{ matrix.arch }}-cache
          cache-to: type=registry,ref=ghcr.io/nayleen/bunny-ddns:${{ matrix.arch }}-cache,mode=max
          context: .
          push: true
          tags: ghcr.io/nayleen/bunny-ddns:${{ matrix.arch }}

  combine-manifests:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Login to Container Registry
        uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: nayleen
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Combine Manifests
        env:
          VERSION: ${{ inputs.version }}
        run: |
          docker buildx imagetools create -t "ghcr.io/nayleen/bunny-ddns:${VERSION}" \
            ghcr.io/nayleen/bunny-ddns:amd64 \
            ghcr.io/nayleen/bunny-ddns:arm64
