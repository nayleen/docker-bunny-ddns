name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - src/**
      - .dockerignore
      - app.php
      - composer.json
      - composer.lock
      - Dockerfile

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  IMAGE_TAG: test

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Local Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          cache-from: type=registry,ref=ghcr.io/nayleen/bunny-ddns:amd64-cache
          context: .
          load: true
          push: false
          tags: "ghcr.io/nayleen/bunny-ddns:${{ env.IMAGE_TAG }}"

      - name: Copy .env File
        run: cp .env.example .env

      - name: Install Composer Dependencies
        run: docker compose run --rm app composer install --prefer-dist --no-progress --no-interaction

      - name: Run Tests
        run: docker compose run --rm app php vendor/bin/phpunit --colors=always

      - name: Run Static Analysis
        run: docker compose run --rm app php vendor/bin/phpstan analyse --no-progress

      - name: Check Coding Style
        run: docker compose run --rm app php vendor/bin/php-cs-fixer check --diff

  release:
    if: ${{ github.event_name == 'push' }}
    needs: test
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build.yaml
