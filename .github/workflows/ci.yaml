name: Continuous Integration

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - .release-please-manifest.json
      - .github/workflows/**
      - src/**
      - .dockerignore
      - app.php
      - composer.json
      - composer.lock
      - Dockerfile
      - release-please-config.json
      - Taskfile.dist.yaml

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  IMAGE_TAG: test

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check Out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build Local Image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          cache-from: type=registry,ref=ghcr.io/nayleen/bunny-ddns:amd64-cache
          context: .
          load: true
          push: false
          tags: "ghcr.io/nayleen/bunny-ddns:${{ env.IMAGE_TAG }}"

      - name: Copy .env File
        run: cp .env.example .env

      - name: Install Composer Dependencies
        run: docker compose --progress=none run --rm app composer install --prefer-dist --no-progress --no-interaction

      - name: Run Tests
        run: docker compose --progress=none run --rm app php vendor/bin/phpunit --colors=always

      - name: Run Static Analysis
        run: docker compose --progress=none run --rm app php vendor/bin/phpstan analyse --no-progress

  release_please:
    if: ${{ github.event_name == 'push' }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0

  release:
    if: ${{ needs.release_please.outputs.release_created == 'true' }}
    needs: release_please
    uses: ./.github/workflows/build.yaml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.release_please.outputs.version }}
